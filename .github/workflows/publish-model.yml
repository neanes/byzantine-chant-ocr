---
name: Publish Model

on:
  push:
    tags:
      - 'model/v*.*.*'
defaults:
  run:
    shell: bash

jobs:
  train-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-ci-model.txt'

      - name: Install dependencies
        run: pip install -r requirements-ci-model.txt

      - name: Train
        run: |
          cd scripts
          python train.py --version $(echo "${{github.ref_name}}" | tr -d 'model/v')
          mv current_model.pth ../models/

      - name: Convert to ONNX
        run: |
          cd scripts
          python convert_to_onnx.py

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            models/metadata.json
            models/current_model.pth
            models/current_model.onnx
            scripts/train_log.txt
          draft: true
