---
name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-ci-model.txt'

      - name: Install dependencies
        run: pip install -r requirements-ci-model.txt

      - name: Train
        run: |
          cd scripts
          python train.py --epochs 1
          mv current_model.pth ../models/

      - name: Convert to ONNX
        run: python convert_to_onnx.py
        working-directory: scripts

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements-ci-app.txt
            requirements.txt

      - name: Install dependencies
        run: pip install -r requirements-ci-app.txt

      - name: Build
        run: pyinstaller --noconsole --name byzantine-chant-ocr app.py
        working-directory: src
